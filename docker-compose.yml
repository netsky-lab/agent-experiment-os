services:
  app:
    build:
      context: .
    container_name: experiment-os-app
    working_dir: /workspace
    environment:
      DATABASE_URL: postgresql://experiment_os:experiment_os@postgres:5432/experiment_os
    volumes:
      - .:/workspace
      - uv_cache:/root/.cache/uv
    depends_on:
      postgres:
        condition: service_healthy

  postgres:
    image: pgvector/pgvector:pg16
    container_name: experiment-os-postgres
    environment:
      POSTGRES_DB: experiment_os
      POSTGRES_USER: experiment_os
      POSTGRES_PASSWORD: experiment_os
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./docker/postgres/init:/docker-entrypoint-initdb.d:ro
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U experiment_os -d experiment_os"]
      interval: 5s
      timeout: 3s
      retries: 20

volumes:
  postgres_data:
  uv_cache:
